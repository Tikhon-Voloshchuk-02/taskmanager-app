<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title> Task Manager</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }
        .container {
            background: white;
            padding: 20px;
            width: 400px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Task Manager</h1>

    <div class="input-group">
        <input id="taskInput" placeholder="Введите задачу">
        <button>Добавить</button>
    </div>

    <ul id="taskList">
        <li>Пример задачи</li>
    </ul>
</div>

</body>
</html>
